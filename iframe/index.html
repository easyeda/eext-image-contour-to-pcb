<!doctype html>
<html lang="zh-Hans">
<head>
	<meta charset="utf-8" />
	<title>图片转轮廓提取器</title>
	<meta content="width=device-width, initial-scale=1.0" name="viewport" />
	<style>
		body {
			font-family: 'Segoe UI', sans-serif;
			background: #f0f2f5;
			padding: 0;
			margin: 0;
			width: 670px;
			height: 750px;
			overflow: hidden;
			display: flex;
			flex-direction: column;
		}

		.preview-box {
			background: white;
			padding: 16px;
			width: 100%;
			height: 100%;
			box-sizing: border-box;
			display: flex;
			flex-direction: column;
			overflow: hidden;
		}

		.preview-title {
			font-size: 16px;
			color: #333;
			margin-bottom: 12px;
			font-weight: bold;
			flex-shrink: 0;
		}

		button {
			padding: 10px 24px;
			background: #1890ff;
			color: white;
			border: none;
			border-radius: 6px;
			cursor: pointer;
			font-size: 14px;
			transition: background 0.3s;
		}

		button:hover {
			background: #096dd9;
		}

		button:disabled {
			background: #d9d9d9;
			cursor: not-allowed;
		}

		.canvas-container {
			position: relative;
			display: flex;
			justify-content: center;
			align-items: center;
			border: 1px solid #eee;
			border-radius: 4px;
			margin-bottom: 12px;
			flex: 1;
			min-height: 0;
			overflow: hidden;
		}

		#previewCanvas {
			display: block;
			cursor: crosshair;
			max-width: 100%;
			max-height: 100%;
		}

		.zoom-info {
			position: absolute;
			top: 8px;
			right: 8px;
			background: rgba(0, 0, 0, 0.7);
			color: white;
			padding: 4px 8px;
			border-radius: 3px;
			font-size: 11px;
			pointer-events: none;
		}

		.controls {
			display: flex;
			gap: 12px;
			align-items: center;
			margin-bottom: 12px;
			flex-wrap: wrap;
			padding: 10px;
			background: #f9f9f9;
			border-radius: 4px;
			flex-shrink: 0;
		}

		.control-group {
			display: flex;
			flex-direction: row;
			gap: 6px;
			align-items: center;
		}

		.control-group label {
			font-size: 13px;
			color: #666;
			white-space: nowrap;
		}

		.control-group select {
			padding: 6px 10px;
			border: 1px solid #d9d9d9;
			border-radius: 4px;
			font-size: 13px;
			min-width: 140px;
		}

		.control-group input[type="number"] {
			padding: 6px 8px;
			border: 1px solid #d9d9d9;
			border-radius: 4px;
			font-size: 13px;
			width: 70px;
		}

		.controls .lock-icon {
			cursor: pointer;
			font-size: 14px;
			color: #1890ff;
			user-select: none;
			padding: 0 4px;
		}

		.controls .lock-icon:hover {
			opacity: 0.8;
		}

		.controls .lock-icon.unlocked {
			color: #999;
		}

		.selected-list {
			margin-top: 12px;
			padding: 12px;
			background: #f5f5f5;
			border-radius: 4px;
			max-height: 200px;
			overflow-y: auto;
			flex-shrink: 0;
		}

		.selected-list-title {
			font-size: 13px;
			font-weight: bold;
			color: #333;
			margin-bottom: 8px;
		}

		.selected-item {
			display: flex;
			flex-direction: column;
			padding: 10px;
			background: white;
			border-radius: 4px;
			margin-bottom: 6px;
			gap: 6px;
		}

		.selected-item-header {
			display: flex;
			justify-content: space-between;
			align-items: center;
		}

		.selected-item-info {
			font-size: 12px;
			color: #666;
			font-weight: bold;
			flex-shrink: 0;
		}

		.selected-item-controls {
			display: flex;
			flex-wrap: wrap;
			gap: 6px;
			align-items: center;
		}

		.selected-item-controls label {
			font-size: 11px;
			color: #666;
			white-space: nowrap;
		}

		.selected-item-controls select,
		.selected-item-controls input {
			padding: 4px 6px;
			border: 1px solid #d9d9d9;
			border-radius: 3px;
			font-size: 11px;
		}

		.selected-item-controls select {
			flex: 1;
			min-width: 100px;
			max-width: 150px;
		}

		.selected-item-controls input[type="number"] {
			width: 60px;
		}

		.selected-item-size {
			display: flex;
			gap: 6px;
			align-items: center;
			padding: 6px;
			background: #f9f9f9;
			border-radius: 3px;
			flex-wrap: wrap;
		}

		.selected-item-size label {
			font-size: 11px;
			color: #666;
			white-space: nowrap;
		}

		.selected-item-size input {
			padding: 4px 6px;
			border: 1px solid #d9d9d9;
			border-radius: 3px;
			font-size: 11px;
			width: 70px;
		}

		.selected-item-size .lock-icon {
			cursor: pointer;
			font-size: 14px;
			color: #666;
			user-select: none;
			padding: 0 4px;
		}

		.selected-item-size .lock-icon:hover {
			color: #1890ff;
		}

		.selected-item-size .lock-icon.locked {
			color: #1890ff;
		}

		.selected-item-remove {
			color: #ff4d4f;
			cursor: pointer;
			font-size: 16px;
			padding: 0 6px;
			flex-shrink: 0;
		}

		.selected-item-remove:hover {
			color: #cf1322;
		}

		.button-group {
			display: flex;
			gap: 8px;
			margin-top: 12px;
			flex-shrink: 0;
		}
	</style>
</head>
<body>

<div class="preview-box show" id="previewBox">
	<div class="controls">
		<div style="display: flex; gap: 12px; align-items: center; width: 100%;">
			<button onclick="selectImage()">选择图片</button>
			<div class="control-group">
				<label>选择层:</label>
				<select id="layerSelect">
					<option value="13">文档层 (DOCUMENT)</option>
					<option value="1">顶层 (TOP)</option>
					<option value="2">底层 (BOTTOM)</option>
					<option value="11">板框层 (BOARD_OUTLINE)</option>
					<option value="3">顶部丝印 (TOP_SILKSCREEN)</option>
					<option value="4">底部丝印 (BOTTOM_SILKSCREEN)</option>
					<option value="5">顶部阻焊 (TOP_SOLDER_MASK)</option>
					<option value="6">底部阻焊 (BOTTOM_SOLDER_MASK)</option>
					<option value="12">多层 (MULTI)</option>
				</select>
			</div>
		</div>
		<div style="display: flex; gap: 12px; align-items: center; width: 100%;">
			<div class="control-group">
				<label>单位:</label>
				<select id="unitSelect" onchange="updateUnit()">
					<option value="mil">mil</option>
					<option value="mm">mm</option>
				</select>
			</div>
			<div class="control-group">
				<label>图片宽度:</label>
				<input type="number" id="globalWidth" min="0.001" step="0.1" value="0" 
					onchange="updateGlobalSize('width', this.value)" disabled />
				<span id="widthUnit">mil</span>
			</div>
			<span class="lock-icon" id="globalLock" onclick="toggleGlobalLock()" title="锁定宽高比">🔒</span>
			<div class="control-group">
				<label>高度:</label>
				<input type="number" id="globalHeight" min="0.001" step="0.1" value="0" 
					onchange="updateGlobalSize('height', this.value)" disabled />
				<span id="heightUnit">mil</span>
			</div>
		</div>
	</div>

	<div class="canvas-container">
		<canvas id="previewCanvas"></canvas>
		<div class="zoom-info" id="zoomInfo">缩放: 100%</div>
	</div>

	<div class="selected-list" id="selectedList" style="display: none;">
		<div class="selected-list-title">已选择的轮廓 (<span id="selectedCount">0</span>)</div>
		<div id="selectedItems"></div>
	</div>

	<div class="button-group">
		<button onclick="selectAll()">全选轮廓</button>
		<button onclick="clearSelection()">清除选择</button>
		<button onclick="mergeSelected()" id="mergeButton" disabled>合并选中轮廓</button>
		<button onclick="generateFill()">生成图元</button>
	</div>
</div>

<script>
	let currentImageFile = null;
	let polygonData = null;
	let selectedPolygons = []; // 存储选中的多边形及其层信息
	let canvas, ctx;
	let imageWidth, imageHeight;
	let zoomLevel = 1; // 缩放级别
	let panX = 0, panY = 0; // 平移偏移
	let isDragging = false; // 是否正在拖动
	let lastMouseX = 0, lastMouseY = 0; // 上次鼠标位置
	let baseDisplayScale = 1; // 基础显示缩放比例
	let debugClickPoint = null; // 调试：显示点击位置
	
	// 全局尺寸设置
	let globalWidth = 0; // 全局图片宽度
	let globalHeight = 0; // 全局图片高度
	let globalOriginalWidth = 0; // 原始图片宽度
	let globalOriginalHeight = 0; // 原始图片高度
	let globalAspectRatioLocked = true; // 全局宽高比锁定
	let currentUnit = 'mil'; // 当前单位

	/**
	 * 更新单位
	 */
	function updateUnit() {
		const newUnit = document.getElementById('unitSelect').value;
		const oldUnit = currentUnit;
		
		if (newUnit === oldUnit) return;
		
		// 转换系数：1 mm = 39.3701 mil
		const conversionFactor = newUnit === 'mm' ? (1 / 39.3701) : 39.3701;
		
		// 转换全局尺寸
		if (globalWidth > 0) {
			globalWidth *= conversionFactor;
			globalOriginalWidth *= conversionFactor;
			document.getElementById('globalWidth').value = globalWidth.toFixed(3);
		}
		
		if (globalHeight > 0) {
			globalHeight *= conversionFactor;
			globalOriginalHeight *= conversionFactor;
			document.getElementById('globalHeight').value = globalHeight.toFixed(3);
		}
		
		// 转换所有已选择的轮廓尺寸和线宽
		selectedPolygons.forEach(item => {
			item.width *= conversionFactor;
			item.height *= conversionFactor;
			item.originalWidth *= conversionFactor;
			item.originalHeight *= conversionFactor;
			// 转换线宽
			if (item.lineWidth > 0) {
				item.lineWidth *= conversionFactor;
			}
		});
		
		// 更新单位显示
		document.getElementById('widthUnit').textContent = newUnit;
		document.getElementById('heightUnit').textContent = newUnit;
		
		currentUnit = newUnit;
		
		// 更新列表显示
		updateSelectedList();
		
		// console.log(`单位已从 ${oldUnit} 转换为 ${newUnit}，转换系数: ${conversionFactor.toFixed(6)}`);
	}

	/**
	 * 切换全局宽高比锁定状态
	 */
	function toggleGlobalLock() {
		globalAspectRatioLocked = !globalAspectRatioLocked;
		const lockIcon = document.getElementById('globalLock');
		if (globalAspectRatioLocked) {
			lockIcon.textContent = '🔒';
			lockIcon.classList.remove('unlocked');
			lockIcon.title = '点击解锁宽高比';
		} else {
			lockIcon.textContent = '🔓';
			lockIcon.classList.add('unlocked');
			lockIcon.title = '点击锁定宽高比';
		}
		// console.log('全局宽高比锁定状态:', globalAspectRatioLocked);
	}

	/**
	 * 更新全局尺寸
	 */
	function updateGlobalSize(dimension, value) {
		const newValue = parseFloat(value);
		
		if (newValue <= 0 || isNaN(newValue)) {
			// 恢复原值
			document.getElementById('globalWidth').value = globalWidth.toFixed(3);
			document.getElementById('globalHeight').value = globalHeight.toFixed(3);
			return;
		}
		
		if (dimension === 'width') {
			globalWidth = newValue;
			
			// 如果锁定宽高比，同时更新高度
			if (globalAspectRatioLocked && globalOriginalWidth > 0) {
				const aspectRatio = globalOriginalHeight / globalOriginalWidth;
				globalHeight = globalWidth * aspectRatio;
				document.getElementById('globalHeight').value = globalHeight.toFixed(3);
			}
		} else if (dimension === 'height') {
			globalHeight = newValue;
			
			// 如果锁定宽高比，同时更新宽度
			if (globalAspectRatioLocked && globalOriginalHeight > 0) {
				const aspectRatio = globalOriginalWidth / globalOriginalHeight;
				globalWidth = globalHeight * aspectRatio;
				document.getElementById('globalWidth').value = globalWidth.toFixed(3);
			}
		}
		
		// 计算缩放比例
		const scaleX = globalWidth / globalOriginalWidth;
		const scaleY = globalHeight / globalOriginalHeight;
		
		// console.log('全局尺寸更新:', { 
		// 	width: globalWidth, 
		// 	height: globalHeight,
		// 	scaleX: scaleX,
		// 	scaleY: scaleY
		// });
		
		// 应用到所有已选择的轮廓
		applyGlobalScaleToSelected(scaleX, scaleY);
	}

	/**
	 * 将全局缩放比例应用到所有选中的轮廓
	 */
	function applyGlobalScaleToSelected(scaleX, scaleY) {
		if (selectedPolygons.length === 0) return;
		
		selectedPolygons.forEach(item => {
			// 应用缩放比例到每个轮廓的当前尺寸
			// 注意：originalWidth/originalHeight 保持不变，它们是相对于原始图片的尺寸
			item.width = item.originalWidth * scaleX;
			item.height = item.originalHeight * scaleY;
		});
		
		// 更新显示
		updateSelectedList();
		
		// console.log(`已将全局缩放比例应用到 ${selectedPolygons.length} 个轮廓`);
	}

	/**
	 * 选择图片文件
	 */
	async function selectImage() {
		try {
			// 打开文件选择对话框，只允许选择 PNG 文件
			const file = await eda.sys_FileSystem.openReadFileDialog(['png'], false);
			
			if (!file) {
				eda.sys_Message.showToastMessage('未选择文件', 'warn');
				return;
			}

			currentImageFile = file;
			selectedPolygons = []; // 重置选择

			// 加载图片并转换为多边形
			await loadAndConvertImage();

			eda.sys_Message.showToastMessage('图片加载成功，点击轮廓进行选择', 'success');
		} catch (err) {
			eda.sys_Message.showToastMessage('选择文件失败: ' + err, 'error');
			// console.error('选择文件失败:', err);
		}
	}

	/**
	 * 加载图片并转换为多边形
	 */
	async function loadAndConvertImage() {
		const img = new Image();
		const url = URL.createObjectURL(currentImageFile);
		
		await new Promise((resolve, reject) => {
			img.onload = resolve;
			img.onerror = reject;
			img.src = url;
		});

		imageWidth = img.naturalWidth;
		imageHeight = img.naturalHeight;

		// 调用 PCB_MathPolygon API 转换图片为复杂多边形
		polygonData = await eda.pcb_MathPolygon.convertImageToComplexPolygon(
			currentImageFile,
			imageWidth,
			imageHeight,
			0.35, // 精度参数
		);

		// console.log('生成的多边形对象:', polygonData);
		
		// 调试：检查多边形坐标范围
		if (polygonData && polygonData.complexPolygon && polygonData.complexPolygon.length > 0) {
			let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
			
			// 遍历所有多边形找到真实的坐标范围
			polygonData.complexPolygon.forEach(polygon => {
				for (let i = 0; i < polygon.length; i++) {
					if (polygon[i] === 'L') {
						continue;
					} else if (typeof polygon[i] === 'number') {
						const x = polygon[i];
						if (i + 1 < polygon.length && typeof polygon[i + 1] === 'number') {
							const y = polygon[i + 1];
							minX = Math.min(minX, x);
							maxX = Math.max(maxX, x);
							minY = Math.min(minY, y);
							maxY = Math.max(maxY, y);
							i++; // 跳过 y
						}
					}
				}
			});
			
			// console.log('多边形坐标范围:', { minX, maxX, minY, maxY });
			// console.log('图片尺寸:', { width: imageWidth, height: imageHeight });
			// console.log('坐标范围宽度:', maxX - minX, '高度:', maxY - minY);
			// console.log('图片宽高比:', imageWidth / imageHeight);
			// console.log('坐标宽高比:', (maxX - minX) / (maxY - minY));
			
			// 保存坐标范围供后续使用
			window.polygonBounds = { minX, maxX, minY, maxY };
			
			// 初始化全局尺寸
			globalOriginalWidth = maxX - minX;
			globalOriginalHeight = maxY - minY;
			globalWidth = globalOriginalWidth;
			globalHeight = globalOriginalHeight;
			
			// 更新UI
			document.getElementById('globalWidth').value = globalWidth.toFixed(3);
			document.getElementById('globalHeight').value = globalHeight.toFixed(3);
			document.getElementById('globalWidth').disabled = false;
			document.getElementById('globalHeight').disabled = false;
			
			// console.log('全局尺寸初始化:', { width: globalWidth, height: globalHeight });
		}

		// 在 Canvas 上绘制图片和轮廓
		drawImageAndPolygons(img);

		URL.revokeObjectURL(url);
	}

	/**
	 * 在 Canvas 上绘制图片和轮廓
	 */
	function drawImageAndPolygons(img) {
		canvas = document.getElementById('previewCanvas');
		ctx = canvas.getContext('2d');

		// 设置 Canvas 尺寸（限制最大显示尺寸）
		const maxWidth = 700;
		
		// 根据多边形的宽高比来设置 Canvas 尺寸
		if (window.polygonBounds) {
			const { minX, maxX, minY, maxY } = window.polygonBounds;
			const polygonWidth = maxX - minX;
			const polygonHeight = maxY - minY;
			const polygonAspectRatio = polygonWidth / polygonHeight;
			
			// 根据多边形宽高比设置 Canvas
			if (polygonAspectRatio > 1) {
				// 宽度大于高度
				canvas.width = maxWidth;
				canvas.height = maxWidth / polygonAspectRatio;
			} else {
				// 高度大于宽度
				canvas.height = maxWidth;
				canvas.width = maxWidth * polygonAspectRatio;
			}
			
			baseDisplayScale = canvas.width / polygonWidth;
		} else {
			// 如果没有坐标范围，使用图片尺寸
			baseDisplayScale = Math.min(1, maxWidth / imageWidth);
			canvas.width = imageWidth * baseDisplayScale;
			canvas.height = imageHeight * baseDisplayScale;
		}

		// 重置缩放和平移
		zoomLevel = 1;
		panX = 0;
		panY = 0;

		// 绘制
		redrawCanvas();

		// 添加事件监听
		canvas.addEventListener('click', handleCanvasClick);
		canvas.addEventListener('wheel', handleWheel, { passive: false });
		canvas.addEventListener('mousedown', handleMouseDown);
		canvas.addEventListener('mousemove', handleMouseMove);
		canvas.addEventListener('mouseup', handleMouseUp);
		canvas.addEventListener('mouseleave', handleMouseUp);
	}

	/**
	 * 绘制单个多边形
	 */
	function drawPolygon(polygon, highlight = false) {
		if (!polygon || polygon.length < 4 || !window.polygonBounds) return;

		const { minX, maxX, minY, maxY } = window.polygonBounds;
		const polygonWidth = maxX - minX;
		const polygonHeight = maxY - minY;

		ctx.beginPath();
		
		let firstPoint = true;
		
		for (let i = 0; i < polygon.length; i++) {
			if (polygon[i] === 'L') {
				continue;
			} else if (typeof polygon[i] === 'number') {
				const xMM = polygon[i];
				if (i + 1 < polygon.length && typeof polygon[i + 1] === 'number') {
					const yMM = polygon[i + 1];
					
					// 转换坐标：从多边形坐标系到 Canvas 坐标系
					// 归一化到 0-1，然后映射到 Canvas 尺寸
					const xNorm = (xMM - minX) / polygonWidth;
					const yNorm = (maxY - yMM) / polygonHeight;
					const xPixel = xNorm * canvas.width;
					const yPixel = yNorm * canvas.height;
					
					if (firstPoint) {
						ctx.moveTo(xPixel, yPixel);
						firstPoint = false;
					} else {
						ctx.lineTo(xPixel, yPixel);
					}
					
					i++;
				}
			}
		}
		
		ctx.closePath();
		
		if (highlight) {
			ctx.fillStyle = 'rgba(24, 144, 255, 0.3)';
			ctx.fill();
		}
		ctx.stroke();
	}

	/**
	 * 处理滚轮缩放
	 */
	function handleWheel(event) {
		event.preventDefault();
		
		const rect = canvas.getBoundingClientRect();
		const mouseX = event.clientX - rect.left;
		const mouseY = event.clientY - rect.top;
		
		// 计算 CSS 缩放比例
		const scaleX = canvas.width / rect.width;
		const scaleY = canvas.height / rect.height;
		
		// 转换为 Canvas 坐标
		const canvasMouseX = mouseX * scaleX;
		const canvasMouseY = mouseY * scaleY;
		
		// 缩放因子
		const zoomFactor = event.deltaY > 0 ? 0.9 : 1.1;
		const newZoomLevel = zoomLevel * zoomFactor;
		
		// 限制缩放范围
		if (newZoomLevel < 0.5 || newZoomLevel > 5) {
			return;
		}
		
		// 计算缩放中心点（在世界坐标系中）
		const zoomPointX = (canvasMouseX - panX) / zoomLevel;
		const zoomPointY = (canvasMouseY - panY) / zoomLevel;
		
		// 更新缩放级别
		zoomLevel = newZoomLevel;
		
		// 调整平移以保持鼠标位置不变
		panX = canvasMouseX - zoomPointX * zoomLevel;
		panY = canvasMouseY - zoomPointY * zoomLevel;
		
		// 更新缩放显示
		document.getElementById('zoomInfo').textContent = `缩放: ${Math.round(zoomLevel * 100)}%`;
		
		// 重新绘制
		redrawCanvas();
	}

	/**
	 * 处理鼠标按下
	 */
	function handleMouseDown(event) {
		if (event.button === 0) { // 左键
			isDragging = true;
			lastMouseX = event.clientX;
			lastMouseY = event.clientY;
			canvas.style.cursor = 'grabbing';
		}
	}

	/**
	 * 处理鼠标移动
	 */
	function handleMouseMove(event) {
		if (isDragging) {
			const deltaX = event.clientX - lastMouseX;
			const deltaY = event.clientY - lastMouseY;
			
			panX += deltaX;
			panY += deltaY;
			
			lastMouseX = event.clientX;
			lastMouseY = event.clientY;
			
			redrawCanvas();
		}
	}

	/**
	 * 处理鼠标释放
	 */
	function handleMouseUp(event) {
		isDragging = false;
		canvas.style.cursor = 'crosshair';
	}

	/**
	 * 处理 Canvas 点击事件
	 */
	function handleCanvasClick(event) {
		if (!polygonData || !polygonData.complexPolygon || isDragging) return;

		const rect = canvas.getBoundingClientRect();
		
		// 原始点击坐标（相对于 Canvas 元素的 CSS 显示尺寸）
		const canvasX = event.clientX - rect.left;
		const canvasY = event.clientY - rect.top;
		
		// 计算 CSS 缩放比例（Canvas 实际尺寸 vs CSS 显示尺寸）
		const scaleX = canvas.width / rect.width;
		const scaleY = canvas.height / rect.height;
		
		// 先将 CSS 坐标转换为 Canvas 坐标
		const canvasPixelX = canvasX * scaleX;
		const canvasPixelY = canvasY * scaleY;
		
		// 再应用逆向变换（考虑缩放和平移）
		const clickX = (canvasPixelX - panX) / zoomLevel;
		const clickY = (canvasPixelY - panY) / zoomLevel;

		// 保存点击位置用于调试显示
		debugClickPoint = { x: clickX, y: clickY };

		// console.log('=== 点击调试信息 ===');
		// console.log('CSS坐标:', { canvasX, canvasY });
		// console.log('Canvas像素坐标:', { canvasPixelX, canvasPixelY });
		// console.log('世界坐标:', { clickX, clickY });
		// console.log('Canvas尺寸:', { width: canvas.width, height: canvas.height });
		// console.log('Canvas CSS尺寸:', { 
		// 	width: rect.width, 
		// 	height: rect.height,
		// 	scaleX: scaleX,
		// 	scaleY: scaleY
		// });
		// console.log('变换参数:', { zoomLevel, panX, panY });
		// console.log('多边形范围:', window.polygonBounds);
		// console.log('设备像素比:', window.devicePixelRatio);
		
		// 测试：绘制第一个多边形的第一个点
		if (polygonData.complexPolygon.length > 0) {
			const firstPolygon = polygonData.complexPolygon[0];
			let firstX, firstY;
			for (let i = 0; i < firstPolygon.length; i++) {
				if (firstPolygon[i] !== 'L' && typeof firstPolygon[i] === 'number') {
					firstX = firstPolygon[i];
					if (i + 1 < firstPolygon.length && typeof firstPolygon[i + 1] === 'number') {
						firstY = firstPolygon[i + 1];
						break;
					}
				}
			}
			if (firstX !== undefined && firstY !== undefined) {
				const { minX, maxX, minY, maxY } = window.polygonBounds;
				const polygonWidth = maxX - minX;
				const polygonHeight = maxY - minY;
				const xNorm = (firstX - minX) / polygonWidth;
				const yNorm = (maxY - firstY) / polygonHeight;
				const xPixel = xNorm * canvas.width;
				const yPixel = yNorm * canvas.height;
				// console.log('第一个点原始坐标:', { firstX, firstY });
				// console.log('第一个点归一化:', { xNorm, yNorm });
				// console.log('第一个点像素坐标:', { xPixel, yPixel });
			}
		}

		// 查找所有包含点击位置的多边形
		const matchedPolygons = [];
		for (let i = 0; i < polygonData.complexPolygon.length; i++) {
			if (isPointInPolygon(clickX, clickY, polygonData.complexPolygon[i])) {
				// 计算多边形面积
				const area = calculatePolygonArea(polygonData.complexPolygon[i]);
				matchedPolygons.push({ index: i, area: area });
				// console.log(`多边形 ${i} 匹配，面积:`, area);
			}
		}

		// console.log('匹配的多边形数量:', matchedPolygons.length);

		// 如果有多个匹配，选择面积最小的（最内层的）
		if (matchedPolygons.length > 0) {
			matchedPolygons.sort((a, b) => a.area - b.area);
			togglePolygonSelection(matchedPolygons[0].index);
		} else {
			// console.log('没有匹配的多边形');
			// 即使没有匹配也重绘，显示点击位置
			redrawCanvas();
		}
	}

	/**
	 * 计算多边形面积
	 */
	function calculatePolygonArea(polygon) {
		if (!window.polygonBounds) return 0;
		
		const points = [];
		const { minX, maxX, minY, maxY } = window.polygonBounds;
		const polygonWidth = maxX - minX;
		const polygonHeight = maxY - minY;
		
		// 提取所有点
		for (let i = 0; i < polygon.length; i++) {
			if (polygon[i] === 'L') {
				continue;
			} else if (typeof polygon[i] === 'number') {
				const xMM = polygon[i];
				if (i + 1 < polygon.length && typeof polygon[i + 1] === 'number') {
					const yMM = polygon[i + 1];
					
					const xNorm = (xMM - minX) / polygonWidth;
					const yNorm = (maxY - yMM) / polygonHeight;
					const xPixel = xNorm * canvas.width;
					const yPixel = yNorm * canvas.height;
					
					points.push({ x: xPixel, y: yPixel });
					i++;
				}
			}
		}

		if (points.length < 3) return 0;

		// 使用鞋带公式计算面积
		let area = 0;
		for (let i = 0; i < points.length; i++) {
			const j = (i + 1) % points.length;
			area += points[i].x * points[j].y;
			area -= points[j].x * points[i].y;
		}
		return Math.abs(area / 2);
	}

	/**
	 * 判断点是否在多边形内
	 */
	function isPointInPolygon(x, y, polygon) {
		if (!window.polygonBounds) return false;
		
		let inside = false;
		const points = [];
		
		const { minX, maxX, minY, maxY } = window.polygonBounds;
		const polygonWidth = maxX - minX;
		const polygonHeight = maxY - minY;
		
		// 提取所有点
		for (let i = 0; i < polygon.length; i++) {
			if (polygon[i] === 'L') {
				continue;
			} else if (typeof polygon[i] === 'number') {
				const xMM = polygon[i];
				if (i + 1 < polygon.length && typeof polygon[i + 1] === 'number') {
					const yMM = polygon[i + 1];
					
					// 转换坐标：使用与绘制相同的转换
					const xNorm = (xMM - minX) / polygonWidth;
					const yNorm = (maxY - yMM) / polygonHeight;
					const xPixel = xNorm * canvas.width;
					const yPixel = yNorm * canvas.height;
					
					points.push({ x: xPixel, y: yPixel });
					i++;
				}
			}
		}

		if (points.length < 3) return false;

		// 射线法判断
		for (let i = 0, j = points.length - 1; i < points.length; j = i++) {
			const xi = points[i].x, yi = points[i].y;
			const xj = points[j].x, yj = points[j].y;

			const intersect = ((yi > y) !== (yj > y)) &&
				(x < (xj - xi) * (y - yi) / (yj - yi) + xi);
			if (intersect) inside = !inside;
		}

		return inside;
	}

	/**
	 * 切换多边形选择状态
	 */
	function togglePolygonSelection(index) {
		const existingIndex = selectedPolygons.findIndex(item => item.index === index);
		const selectedLayer = parseInt(document.getElementById('layerSelect').value);

		if (existingIndex >= 0) {
			// 已选中，取消选择
			selectedPolygons.splice(existingIndex, 1);
		} else {
			// 未选中，添加选择（添加默认线宽和尺寸信息）
			const bounds = calculatePolygonBounds(polygonData.complexPolygon[index]);
			
			// 如果当前单位是 mm，需要转换边界尺寸（原始坐标系是 mil）
			const unitConversionFactor = currentUnit === 'mm' ? (1 / 39.3701) : 1;
			const boundsWidth = bounds.width * unitConversionFactor;
			const boundsHeight = bounds.height * unitConversionFactor;
			
			// 计算当前全局缩放比例
			let scaleX = 1;
			let scaleY = 1;
			if (globalOriginalWidth > 0 && globalOriginalHeight > 0) {
				scaleX = globalWidth / globalOriginalWidth;
				scaleY = globalHeight / globalOriginalHeight;
			}
			
			// 应用全局缩放比例到新选中的轮廓
			selectedPolygons.push({
				index: index,
				layer: selectedLayer,
				lineWidth: 0, // 默认线宽为 0（填充）
				width: boundsWidth * scaleX,
				height: boundsHeight * scaleY,
				originalWidth: boundsWidth,
				originalHeight: boundsHeight,
				aspectRatioLocked: true // 默认锁定宽高比
			});
			
			// console.log(`选中轮廓 ${index}，单位: ${currentUnit}, 应用缩放比例 scaleX=${scaleX.toFixed(3)}, scaleY=${scaleY.toFixed(3)}`);
		}

		// 重新绘制
		redrawCanvas();
		updateSelectedList();
	}

	/**
	 * 计算多边形的边界框
	 */
	function calculatePolygonBounds(polygon) {
		if (!window.polygonBounds) return { width: 0, height: 0 };
		
		let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
		
		// 提取所有点并找到边界
		for (let i = 0; i < polygon.length; i++) {
			if (polygon[i] === 'L') {
				continue;
			} else if (typeof polygon[i] === 'number') {
				const xMM = polygon[i];
				if (i + 1 < polygon.length && typeof polygon[i + 1] === 'number') {
					const yMM = polygon[i + 1];
					minX = Math.min(minX, xMM);
					maxX = Math.max(maxX, xMM);
					minY = Math.min(minY, yMM);
					maxY = Math.max(maxY, yMM);
					i++;
				}
			}
		}
		
		return {
			width: maxX - minX,
			height: maxY - minY,
			minX: minX,
			maxX: maxX,
			minY: minY,
			maxY: maxY
		};
	}

	/**
	 * 缩放多边形（直接缩放坐标）
	 */
	function scalePolygon(polygon, scaleX, scaleY) {
		// console.log(`缩放多边形 - 缩放比例: X=${scaleX.toFixed(3)}, Y=${scaleY.toFixed(3)}`);
		
		// 创建新的多边形数组
		const scaledPolygon = [];
		
		for (let i = 0; i < polygon.length; i++) {
			if (polygon[i] === 'L') {
				scaledPolygon.push('L');
			} else if (typeof polygon[i] === 'number') {
				const x = polygon[i];
				if (i + 1 < polygon.length && typeof polygon[i + 1] === 'number') {
					const y = polygon[i + 1];
					
					// 直接缩放坐标，不使用参考点
					const newX = x * scaleX;
					const newY = y * scaleY;
					
					scaledPolygon.push(newX);
					scaledPolygon.push(newY);
					i++; // 跳过 y
				} else {
					scaledPolygon.push(x);
				}
			}
		}
		
		// 验证缩放后的边界
		const originalBounds = calculatePolygonBounds(polygon);
		const scaledBounds = calculatePolygonBounds(scaledPolygon);
		// console.log(`缩放多边形 - 原始边界:`, originalBounds);
		// console.log(`缩放多边形 - 缩放后边界:`, scaledBounds);
		// console.log(`缩放多边形 - 实际缩放比例: X=${(scaledBounds.width / originalBounds.width).toFixed(3)}, Y=${(scaledBounds.height / originalBounds.height).toFixed(3)}`);
		
		return scaledPolygon;
	}

	/**
	 * 重新绘制 Canvas
	 */
	function redrawCanvas() {
		// 清空画布
		ctx.clearRect(0, 0, canvas.width, canvas.height);
		
		// 填充白色背景
		ctx.fillStyle = 'white';
		ctx.fillRect(0, 0, canvas.width, canvas.height);
		
		// 保存当前状态
		ctx.save();
		
		// 应用缩放和平移
		ctx.translate(panX, panY);
		ctx.scale(zoomLevel, zoomLevel);
		
		// 只绘制轮廓，不绘制图片
		if (polygonData && polygonData.complexPolygon && Array.isArray(polygonData.complexPolygon)) {
			polygonData.complexPolygon.forEach((polygon, index) => {
				const isSelected = selectedPolygons.some(item => item.index === index);
				if (isSelected) {
					ctx.strokeStyle = 'rgba(82, 196, 26, 1)';
					ctx.lineWidth = 3 / zoomLevel;
				} else {
					ctx.strokeStyle = 'rgba(24, 144, 255, 0.8)';
					ctx.lineWidth = 2 / zoomLevel;
				}
				drawPolygon(polygon, isSelected);
			});
		}
		
		// 绘制调试点击位置
		if (debugClickPoint) {
			ctx.fillStyle = 'red';
			ctx.beginPath();
			ctx.arc(debugClickPoint.x, debugClickPoint.y, 5 / zoomLevel, 0, Math.PI * 2);
			ctx.fill();
			
			// 绘制十字线
			ctx.strokeStyle = 'red';
			ctx.lineWidth = 1 / zoomLevel;
			ctx.beginPath();
			ctx.moveTo(debugClickPoint.x - 10 / zoomLevel, debugClickPoint.y);
			ctx.lineTo(debugClickPoint.x + 10 / zoomLevel, debugClickPoint.y);
			ctx.moveTo(debugClickPoint.x, debugClickPoint.y - 10 / zoomLevel);
			ctx.lineTo(debugClickPoint.x, debugClickPoint.y + 10 / zoomLevel);
			ctx.stroke();
		}
		
		ctx.restore();
	}

	/**
	 * 更新已选择列表
	 */
	function updateSelectedList() {
		const selectedList = document.getElementById('selectedList');
		const selectedItems = document.getElementById('selectedItems');
		const selectedCount = document.getElementById('selectedCount');
		const mergeButton = document.getElementById('mergeButton');

		if (selectedPolygons.length === 0) {
			selectedList.style.display = 'none';
			mergeButton.disabled = true;
			return;
		}

		selectedList.style.display = 'block';
		selectedCount.textContent = selectedPolygons.length;
		
		// 至少需要 2 个轮廓才能合并
		mergeButton.disabled = selectedPolygons.length < 2;

		const layerSelect = document.getElementById('layerSelect');
		const layerOptions = Array.from(layerSelect.options).map(opt => ({
			value: opt.value,
			text: opt.text
		}));

		selectedItems.innerHTML = selectedPolygons.map((item, idx) => {
			const layerOptionsHtml = layerOptions.map(opt => 
				`<option value="${opt.value}" ${opt.value == item.layer ? 'selected' : ''}>${opt.text}</option>`
			).join('');

			const lockIcon = item.aspectRatioLocked ? '🔒' : '🔓';
			const lockClass = item.aspectRatioLocked ? 'locked' : '';

			return `
				<div class="selected-item">
					<div class="selected-item-header">
						<span class="selected-item-info">轮廓 ${item.index + 1}${item.isMerged ? ' (已合并)' : ''}</span>
						<span class="selected-item-remove" onclick="removeSelection(${idx})">×</span>
					</div>
					<div class="selected-item-controls">
						<label>层:</label>
						<select onchange="updatePolygonLayer(${idx}, this.value)">
							${layerOptionsHtml}
						</select>
						<label>线宽:</label>
						<input type="number" 
							value="${item.lineWidth || 0}" 
							min="0" 
							step="0.1"
							onchange="updatePolygonLineWidth(${idx}, this.value)"
							title="0 表示填充，大于 0 表示轮廓线宽" />
						<span>${currentUnit}</span>
					</div>
					<div class="selected-item-size">
						<label>宽度:</label>
						<input type="number" 
							value="${item.width.toFixed(3)}" 
							min="0.001" 
							step="0.1"
							onchange="updatePolygonWidth(${idx}, this.value)" />
						<span>${currentUnit}</span>
						<span class="lock-icon ${lockClass}" 
							onclick="toggleAspectRatioLock(${idx})"
							title="${item.aspectRatioLocked ? '点击解锁宽高比' : '点击锁定宽高比'}">${lockIcon}</span>
						<label>高度:</label>
						<input type="number" 
							value="${item.height.toFixed(3)}" 
							min="0.001" 
							step="0.1"
							onchange="updatePolygonHeight(${idx}, this.value)" />
						<span>${currentUnit}</span>
					</div>
				</div>
			`;
		}).join('');
	}

	/**
	 * 更新多边形的层
	 */
	function updatePolygonLayer(idx, newLayer) {
		if (idx >= 0 && idx < selectedPolygons.length) {
			selectedPolygons[idx].layer = parseInt(newLayer);
			// console.log(`轮廓 ${selectedPolygons[idx].index + 1} 的层已更新为:`, newLayer);
		}
	}

	/**
	 * 更新多边形的线宽
	 */
	function updatePolygonLineWidth(idx, newLineWidth) {
		if (idx >= 0 && idx < selectedPolygons.length) {
			selectedPolygons[idx].lineWidth = parseFloat(newLineWidth) || 0;
			// console.log(`轮廓 ${selectedPolygons[idx].index + 1} 的线宽已更新为:`, newLineWidth);
		}
	}

	/**
	 * 更新多边形的宽度
	 */
	function updatePolygonWidth(idx, newWidth) {
		if (idx >= 0 && idx < selectedPolygons.length) {
			const item = selectedPolygons[idx];
			const width = parseFloat(newWidth);
			
			if (width <= 0 || isNaN(width)) {
				updateSelectedList();
				return;
			}
			
			item.width = width;
			
			// 如果锁定宽高比，同时更新高度
			if (item.aspectRatioLocked && item.originalWidth > 0) {
				const aspectRatio = item.originalHeight / item.originalWidth;
				item.height = width * aspectRatio;
			}
			
			// console.log(`轮廓 ${item.index + 1} 的尺寸已更新为: ${item.width.toFixed(3)} x ${item.height.toFixed(3)} mm`);
			updateSelectedList();
		}
	}

	/**
	 * 更新多边形的高度
	 */
	function updatePolygonHeight(idx, newHeight) {
		if (idx >= 0 && idx < selectedPolygons.length) {
			const item = selectedPolygons[idx];
			const height = parseFloat(newHeight);
			
			if (height <= 0 || isNaN(height)) {
				updateSelectedList();
				return;
			}
			
			item.height = height;
			
			// 如果锁定宽高比，同时更新宽度
			if (item.aspectRatioLocked && item.originalHeight > 0) {
				const aspectRatio = item.originalWidth / item.originalHeight;
				item.width = height * aspectRatio;
			}
			
			// console.log(`轮廓 ${item.index + 1} 的尺寸已更新为: ${item.width.toFixed(3)} x ${item.height.toFixed(3)} mm`);
			updateSelectedList();
		}
	}

	/**
	 * 切换宽高比锁定状态
	 */
	function toggleAspectRatioLock(idx) {
		if (idx >= 0 && idx < selectedPolygons.length) {
			selectedPolygons[idx].aspectRatioLocked = !selectedPolygons[idx].aspectRatioLocked;
			// console.log(`轮廓 ${selectedPolygons[idx].index + 1} 的宽高比锁定状态:`, selectedPolygons[idx].aspectRatioLocked);
			updateSelectedList();
		}
	}

	/**
	 * 移除单个选择
	 */
	function removeSelection(idx) {
		selectedPolygons.splice(idx, 1);
		redrawCanvas();
		updateSelectedList();
	}

	/**
	 * 全选所有轮廓
	 */
	function selectAll() {
		if (!polygonData || !polygonData.complexPolygon || polygonData.complexPolygon.length === 0) {
			eda.sys_Message.showToastMessage('没有可选择的轮廓', 'warn');
			return;
		}

		const selectedLayer = parseInt(document.getElementById('layerSelect').value);
		
		// 如果当前单位是 mm，需要转换边界尺寸（原始坐标系是 mil）
		const unitConversionFactor = currentUnit === 'mm' ? (1 / 39.3701) : 1;
		
		// 计算当前全局缩放比例
		let scaleX = 1;
		let scaleY = 1;
		if (globalOriginalWidth > 0 && globalOriginalHeight > 0) {
			scaleX = globalWidth / globalOriginalWidth;
			scaleY = globalHeight / globalOriginalHeight;
		}

		// 清空现有选择
		selectedPolygons = [];

		// 选择所有轮廓
		polygonData.complexPolygon.forEach((polygon, index) => {
			const bounds = calculatePolygonBounds(polygon);
			const boundsWidth = bounds.width * unitConversionFactor;
			const boundsHeight = bounds.height * unitConversionFactor;
			
			selectedPolygons.push({
				index: index,
				layer: selectedLayer,
				lineWidth: 0, // 默认线宽为 0（填充）
				width: boundsWidth * scaleX,
				height: boundsHeight * scaleY,
				originalWidth: boundsWidth,
				originalHeight: boundsHeight,
				aspectRatioLocked: true // 默认锁定宽高比
			});
		});

		// 重新绘制
		redrawCanvas();
		updateSelectedList();
		
		eda.sys_Message.showToastMessage(`已选择所有 ${selectedPolygons.length} 个轮廓`, 'success');
		// console.log(`全选了 ${selectedPolygons.length} 个轮廓，单位: ${currentUnit}, 应用缩放比例 scaleX=${scaleX.toFixed(3)}, scaleY=${scaleY.toFixed(3)}`);
	}

	/**
	 * 清除所有选择
	 */
	function clearSelection() {
		selectedPolygons = [];
		redrawCanvas();
		updateSelectedList();
		eda.sys_Message.showToastMessage('已清除所有选择', 'info');
	}

	/**
	 * 合并选中的轮廓
	 */
	async function mergeSelected() {
		if (selectedPolygons.length < 2) {
			eda.sys_Message.showToastMessage('至少需要选择 2 个轮廓才能合并', 'warn');
			return;
		}

		try {
			// 收集所有选中的多边形
			const polygonsToMerge = [];
			let totalScaleX = 0;
			let totalScaleY = 0;
			
			for (const item of selectedPolygons) {
				const polygon = polygonData.complexPolygon[item.index];
				
				// 计算缩放比例
				const scaleX = item.width / item.originalWidth;
				const scaleY = item.height / item.originalHeight;
				totalScaleX += scaleX;
				totalScaleY += scaleY;
				
				// 如果需要缩放，先缩放多边形
				let scaledPolygon = polygon;
				if (Math.abs(scaleX - 1) > 0.001 || Math.abs(scaleY - 1) > 0.001) {
					scaledPolygon = scalePolygon(polygon, scaleX, scaleY);
				}
				
				polygonsToMerge.push(scaledPolygon);
			}

			// 使用第一个轮廓的层和线宽作为合并后的默认值
			const firstItem = selectedPolygons[0];
			const avgScaleX = totalScaleX / selectedPolygons.length;
			const avgScaleY = totalScaleY / selectedPolygons.length;

			// 创建复杂多边形（包含多个轮廓）
			const mergedComplexPolygon = await eda.pcb_MathPolygon.createComplexPolygon(polygonsToMerge);
			
			// console.log('合并的复杂多边形:', mergedComplexPolygon);
			// console.log('包含的多边形数量:', polygonsToMerge.length);

			// 将合并后的复杂多边形添加到 polygonData 中
			const mergedIndex = polygonData.complexPolygon.length;
			
			// 将复杂多边形的所有子多边形添加到数组中
			// 注意：这里我们将整个复杂多边形作为一个整体处理
			polygonData.complexPolygon.push(...polygonsToMerge);

			// 计算合并后的边界框
			let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
			for (const poly of polygonsToMerge) {
				const bounds = calculatePolygonBounds(poly);
				minX = Math.min(minX, bounds.minX);
				maxX = Math.max(maxX, bounds.maxX);
				minY = Math.min(minY, bounds.minY);
				maxY = Math.max(maxY, bounds.maxY);
			}
			
			const mergedWidth = maxX - minX;
			const mergedHeight = maxY - minY;

			// 清除当前选择
			selectedPolygons = [];

			// 添加合并后的轮廓到选择列表
			// 注意：我们需要一个特殊的标记来表示这是一个合并的多边形
			selectedPolygons.push({
				index: mergedIndex,
				indices: selectedPolygons.map(item => item.index), // 保存原始索引
				layer: firstItem.layer,
				lineWidth: firstItem.lineWidth,
				width: mergedWidth,
				height: mergedHeight,
				originalWidth: mergedWidth,
				originalHeight: mergedHeight,
				aspectRatioLocked: true,
				isMerged: true, // 标记为合并的多边形
				mergedPolygons: polygonsToMerge // 保存合并的多边形数组
			});

			// 重新绘制和更新列表
			redrawCanvas();
			updateSelectedList();

			eda.sys_Message.showToastMessage(`成功合并 ${polygonsToMerge.length} 个轮廓`, 'success');
		} catch (err) {
			eda.sys_Message.showToastMessage('合并失败: ' + err, 'error');
			// console.error('合并失败:', err);
		}
	}

	/**
	 * 生成填充图元
	 */
	async function generateFill() {
		if (!polygonData) {
			eda.sys_Message.showToastMessage('请先选择图片', 'warn');
			return;
		}

		if (selectedPolygons.length === 0) {
			eda.sys_Message.showToastMessage('请先选择要填充的轮廓', 'warn');
			return;
		}

		try {
			const primitives = [];
			let fillCount = 0;
			let outlineCount = 0;

			for (const item of selectedPolygons) {
				// 检查是否是合并的多边形
				if (item.isMerged && item.mergedPolygons) {
					// 处理合并的多边形
					// console.log(`处理合并的轮廓，包含 ${item.mergedPolygons.length} 个子轮廓`);
					
					// 计算缩放比例
					const scaleX = item.width / item.originalWidth;
					const scaleY = item.height / item.originalHeight;
					
					// 缩放所有子多边形
					const scaledPolygons = item.mergedPolygons.map(poly => {
						if (Math.abs(scaleX - 1) > 0.001 || Math.abs(scaleY - 1) > 0.001) {
							return scalePolygon(poly, scaleX, scaleY);
						}
						return poly;
					});
					
					// 根据线宽决定创建填充还是轮廓
					if (item.lineWidth > 0) {
						// 对于轮廓，需要为每个子多边形创建单独的轮廓
						for (const scaledPolygon of scaledPolygons) {
							const complexPolygonObj = await eda.pcb_MathPolygon.createComplexPolygon([scaledPolygon]);
							
							// console.log('复杂多边形对象:', complexPolygonObj);
							// console.log('复杂多边形对象的键:', Object.keys(complexPolygonObj));
							
							let singlePolygonObj = null;
							if (complexPolygonObj.polygons && complexPolygonObj.polygons.length > 0) {
								singlePolygonObj = complexPolygonObj.polygons[0];
							} else if (complexPolygonObj) {
								singlePolygonObj = complexPolygonObj;
							}
							
							if (!singlePolygonObj) {
								// console.error('无法获取单多边形对象');
								continue;
							}
							
							try {
								const outlinePrimitive = await eda.pcb_PrimitivePolyline.create(
									'',
									item.layer,
									singlePolygonObj,
									item.lineWidth,
									false
								);
								
								if (outlinePrimitive) {
									primitives.push(outlinePrimitive);
									outlineCount++;
								}
							} catch (createError) {
								// console.error('创建轮廓时出错:', createError);
							}
						}
					} else {
						// 对于填充，创建一个包含所有子多边形的复杂多边形
						const complexPolygonObj = await eda.pcb_MathPolygon.createComplexPolygon(scaledPolygons);
						
						const fillPrimitive = await eda.pcb_PrimitiveFill.create(
							item.layer,
							complexPolygonObj
						);
						
						if (fillPrimitive) {
							primitives.push(fillPrimitive);
							fillCount++;
						}
					}
				} else {
					// 处理单个多边形（原有逻辑）
					const polygon = polygonData.complexPolygon[item.index];
				
					// 计算缩放比例
					const scaleX = item.width / item.originalWidth;
					const scaleY = item.height / item.originalHeight;
					
					// 如果需要缩放，先缩放多边形
					let scaledPolygon = polygon;
					if (Math.abs(scaleX - 1) > 0.001 || Math.abs(scaleY - 1) > 0.001) {
						scaledPolygon = scalePolygon(polygon, scaleX, scaleY);
						// console.log(`轮廓 ${item.index + 1} 缩放比例: X=${scaleX.toFixed(3)}, Y=${scaleY.toFixed(3)}`);
					}
					
					// 根据线宽决定创建填充还是轮廓
					if (item.lineWidth > 0) {
						// 创建轮廓图元：先创建复杂多边形，然后从中获取第一个多边形
						const complexPolygonObj = await eda.pcb_MathPolygon.createComplexPolygon([scaledPolygon]);
						
						// console.log('复杂多边形对象:', complexPolygonObj);
						// console.log('复杂多边形对象的键:', Object.keys(complexPolygonObj));
						// console.log('复杂多边形对象的类型:', typeof complexPolygonObj);
						
						// 尝试不同的方式获取单多边形
						let singlePolygonObj = null;
						
						// 方式1: 直接使用 polygons 属性
						if (complexPolygonObj.polygons && complexPolygonObj.polygons.length > 0) {
							singlePolygonObj = complexPolygonObj.polygons[0];
							// console.log('方式1成功: 从 polygons 数组获取');
						}
						// 方式2: 直接使用复杂多边形对象本身
						else if (complexPolygonObj) {
							singlePolygonObj = complexPolygonObj;
							// console.log('方式2: 直接使用复杂多边形对象');
						}
						
						if (!singlePolygonObj) {
							// console.error('无法获取单多边形对象');
							eda.sys_Message.showToastMessage('无法创建轮廓：无法获取多边形对象', 'error');
							continue;
						}
						
						// console.log('单多边形对象:', singlePolygonObj);
						// console.log('单多边形对象的键:', Object.keys(singlePolygonObj));
						
						try {
							const outlinePrimitive = await eda.pcb_PrimitivePolyline.create(
								'', // 网络名称，空字符串表示无网络
								item.layer,
								singlePolygonObj,
								item.lineWidth,
								false // 不锁定
							);
							
							if (outlinePrimitive) {
								primitives.push(outlinePrimitive);
								outlineCount++;
								// console.log('轮廓创建成功');
							} else {
								// console.error('轮廓创建返回 undefined');
							}
						} catch (createError) {
							// console.error('创建轮廓时出错:', createError);
							// console.error('参数:', {
							// 	net: '',
							// 	layer: item.layer,
							// 	polygon: singlePolygonObj,
							// 	lineWidth: item.lineWidth
							// });
							throw createError;
						}
					} else {
						// 创建填充图元：需要复杂多边形对象
						const complexPolygonObj = await eda.pcb_MathPolygon.createComplexPolygon([scaledPolygon]);
						
						const fillPrimitive = await eda.pcb_PrimitiveFill.create(
							item.layer,
							complexPolygonObj
						);
						
						if (fillPrimitive) {
							primitives.push(fillPrimitive);
							fillCount++;
						}
					}
				}
			}
			
			if (primitives.length === 0) {
				eda.sys_Message.showToastMessage('未能创建任何图元', 'error');
				return;
			}
			
			let message = '成功创建 ';
			if (fillCount > 0) message += `${fillCount} 个填充`;
			if (fillCount > 0 && outlineCount > 0) message += '和';
			if (outlineCount > 0) message += `${outlineCount} 个轮廓`;
			message += '图元，位于坐标原点处';
			
			eda.sys_Message.showToastMessage(message, 'success');
			
			// 清除选择
			clearSelection();
		} catch (err) {
			eda.sys_Message.showToastMessage('生成失败: ' + err, 'error');
			// console.error('生成失败:', err);
			// console.error('错误堆栈:', err.stack);
		}
	}
</script>
