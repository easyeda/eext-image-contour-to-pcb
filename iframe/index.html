<!doctype html>
<html lang="zh-Hans">
<head>
	<meta charset="utf-8" />
	<title></title>
	<meta content="width=device-width, initial-scale=1.0" name="viewport" />
	<style>
		html, body {
			height: 100%;
			margin: 0;
			padding: 0;
		}

		body {
			font-family: 'Segoe UI', sans-serif;
			background: #f0f2f5;
			width: 100%;
			overflow: hidden;
			display: flex;
			flex-direction: column;
		}

		.preview-box {
			background: white;
			padding: 16px;
			width: 100%;
			flex: 1;
			box-sizing: border-box;
			display: flex;
			flex-direction: column;
			overflow-y: auto;
		}

		.preview-title {
			font-size: 16px;
			color: #333;
			margin-bottom: 12px;
			font-weight: bold;
			flex-shrink: 0;
		}

		button {
			padding: 8px 16px;
			background: #1890ff;
			color: white;
			border: none;
			border-radius: 6px;
			cursor: pointer;
			font-size: 13px;
			transition: background 0.3s;
		}

		button:hover {
			background: #096dd9;
		}

		button:disabled {
			background: #d9d9d9;
			cursor: not-allowed;
		}

		.canvas-container {
			position: relative;
			display: flex;
			justify-content: center;
			align-items: center;
			border: 2px solid #d9d9d9;
			border-radius: 4px;
			margin-bottom: 12px;
			flex: 1 1 auto;
			min-height: 150px;
			overflow: hidden;
			background: #f5f5f5;
		}

		#previewCanvas {
			display: block;
			cursor: crosshair;
			background: white;
		}
		
		#previewCanvas:active {
			cursor: crosshair;
		}

		.zoom-info {
			position: absolute;
			top: 8px;
			right: 8px;
			background: rgba(0, 0, 0, 0.7);
			color: white;
			padding: 4px 8px;
			border-radius: 3px;
			font-size: 11px;
			pointer-events: none;
		}

		.controls {
			display: flex;
			gap: 12px;
			align-items: center;
			margin-bottom: 12px;
			flex-wrap: wrap;
			padding: 10px;
			background: #f9f9f9;
			border-radius: 4px;
			flex-shrink: 0;
		}

		.control-group {
			display: flex;
			flex-direction: row;
			gap: 6px;
			align-items: center;
		}

		.control-group label {
			font-size: 13px;
			color: #666;
			white-space: nowrap;
		}

		.control-group select {
			padding: 6px 10px;
			border: 1px solid #d9d9d9;
			border-radius: 4px;
			font-size: 13px;
			min-width: 140px;
		}

		.control-group input[type="number"] {
			padding: 6px 8px;
			border: 1px solid #d9d9d9;
			border-radius: 4px;
			font-size: 13px;
			width: 70px;
		}

		.controls .lock-icon {
			cursor: pointer;
			font-size: 14px;
			color: #1890ff;
			user-select: none;
			padding: 0 4px;
		}

		.controls .lock-icon:hover {
			opacity: 0.8;
		}

		.controls .lock-icon.unlocked {
			color: #999;
		}

		.selected-list {
			margin-top: 12px;
			padding: 12px;
			background: #f5f5f5;
			border-radius: 4px;
			max-height: 200px;
			overflow-y: auto;
			flex-shrink: 0;
			box-sizing: border-box;
		}

		.selected-list-title {
			font-size: 13px;
			font-weight: bold;
			color: #333;
			margin-bottom: 8px;
		}

		.selected-item {
			display: flex;
			flex-direction: column;
			padding: 10px;
			background: white;
			border-radius: 4px;
			margin-bottom: 6px;
			gap: 6px;
		}

		.selected-item-header {
			display: flex;
			justify-content: space-between;
			align-items: center;
		}

		.selected-item-info {
			font-size: 12px;
			color: #666;
			font-weight: bold;
			flex-shrink: 0;
		}

		.selected-item-controls {
			display: flex;
			flex-wrap: wrap;
			gap: 6px;
			align-items: center;
		}

		.selected-item-controls label {
			font-size: 11px;
			color: #666;
			white-space: nowrap;
		}

		.selected-item-controls select,
		.selected-item-controls input {
			padding: 4px 6px;
			border: 1px solid #d9d9d9;
			border-radius: 3px;
			font-size: 11px;
		}

		.selected-item-controls select {
			flex: 1;
			min-width: 100px;
			max-width: 150px;
		}

		.selected-item-controls input[type="number"] {
			width: 60px;
		}

		.selected-item-size {
			display: flex;
			gap: 6px;
			align-items: center;
			padding: 6px;
			background: #f9f9f9;
			border-radius: 3px;
			flex-wrap: wrap;
		}

		.selected-item-size label {
			font-size: 11px;
			color: #666;
			white-space: nowrap;
		}

		.selected-item-size input {
			padding: 4px 6px;
			border: 1px solid #d9d9d9;
			border-radius: 3px;
			font-size: 11px;
			width: 70px;
		}

		.selected-item-size .lock-icon {
			cursor: pointer;
			font-size: 14px;
			color: #666;
			user-select: none;
			padding: 0 4px;
		}

		.selected-item-size .lock-icon:hover {
			color: #1890ff;
		}

		.selected-item-size .lock-icon.locked {
			color: #1890ff;
		}

		.selected-item-remove {
			color: #ff4d4f;
			cursor: pointer;
			font-size: 16px;
			padding: 0 6px;
			flex-shrink: 0;
		}

		.selected-item-remove:hover {
			color: #cf1322;
		}

		.button-group {
			display: flex;
			flex-wrap: wrap;
			gap: 8px;
			margin-top: 12px;
			flex-shrink: 0;
		}
		
		.button-group button {
			flex: 1;
			min-width: 120px;
			white-space: nowrap;
		}

		/* 参数编辑遮罩层 */
		.param-overlay {
			display: none;
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background: rgba(0, 0, 0, 0.5);
			z-index: 100;
			justify-content: center;
			align-items: center;
		}

		.param-overlay.show {
			display: flex;
		}

		.param-dialog {
			background: white;
			border-radius: 8px;
			width: 90%;
			max-width: 700px;
			max-height: 90vh;
			display: flex;
			flex-direction: column;
			overflow: hidden;
			box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
		}

		.param-dialog-header {
			padding: 12px 16px;
			border-bottom: 1px solid #e8e8e8;
			font-size: 15px;
			font-weight: bold;
			color: #333;
			flex-shrink: 0;
		}

		.param-dialog-body {
			display: flex;
			flex: 1;
			overflow: hidden;
			min-height: 0;
		}

		.param-panel {
			width: 220px;
			min-width: 220px;
			padding: 12px;
			border-right: 1px solid #e8e8e8;
			overflow-y: auto;
			flex-shrink: 0;
		}

		.param-item {
			margin-bottom: 12px;
		}

		.param-item label {
			display: block;
			font-size: 12px;
			color: #666;
			margin-bottom: 4px;
		}

		.param-item .param-row {
			display: flex;
			align-items: center;
			gap: 6px;
		}

		.param-item input[type="range"] {
			flex: 1;
			height: 4px;
		}

		.param-item .param-value {
			font-size: 11px;
			color: #333;
			min-width: 32px;
			text-align: right;
		}

		.param-item .param-toggle {
			display: flex;
			align-items: center;
			gap: 8px;
		}

		.param-item .param-toggle input[type="checkbox"] {
			width: 16px;
			height: 16px;
			cursor: pointer;
		}

		.param-item .param-toggle span {
			font-size: 12px;
			color: #333;
		}

		.param-preview {
			flex: 1;
			display: flex;
			justify-content: center;
			align-items: center;
			background: #f5f5f5;
			position: relative;
			overflow: hidden;
			min-height: 300px;
		}

		.param-preview canvas {
			background: white;
			display: block;
		}

		.param-preview .preview-loading {
			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			font-size: 13px;
			color: #999;
		}

		.param-dialog-footer {
			padding: 10px 16px;
			border-top: 1px solid #e8e8e8;
			display: flex;
			justify-content: flex-end;
			gap: 8px;
			flex-shrink: 0;
		}

		.param-dialog-footer button.cancel-btn {
			background: #fff;
			color: #666;
			border: 1px solid #d9d9d9;
		}

		.param-dialog-footer button.cancel-btn:hover {
			color: #1890ff;
			border-color: #1890ff;
		}
	</style>
</head>
<body>

<div class="preview-box show" id="previewBox">
	<div class="controls">
		<div style="display: flex; gap: 12px; align-items: center; width: 100%;">
			<button id="btnSelectImage" onclick="selectImage()"></button>
			<div class="control-group">
				<label id="labelSelectLayer"></label>
				<select id="layerSelect">
					<option value="13"></option>
					<option value="1"></option>
					<option value="2"></option>
					<option value="11"></option>
					<option value="3"></option>
					<option value="4"></option>
					<option value="5"></option>
					<option value="6"></option>
					<option value="12"></option>
				</select>
			</div>
		</div>
		<div style="display: flex; gap: 12px; align-items: center; width: 100%;">
			<div class="control-group">
				<label id="labelUnit"></label>
				<select id="unitSelect" onchange="updateUnit()">
					<option value="mil">mil</option>
					<option value="mm">mm</option>
				</select>
			</div>
			<div class="control-group">
				<label id="labelImageWidth"></label>
				<input type="number" id="globalWidth" min="0.001" step="0.1" value="0" 
					onchange="updateGlobalSize('width', this.value)" disabled />
				<span id="widthUnit">mil</span>
			</div>
			<span class="lock-icon" id="globalLock" onclick="toggleGlobalLock()">🔒</span>
			<div class="control-group">
				<label id="labelHeight"></label>
				<input type="number" id="globalHeight" min="0.001" step="0.1" value="0" 
					onchange="updateGlobalSize('height', this.value)" disabled />
				<span id="heightUnit">mil</span>
			</div>
		</div>
	</div>

	<div class="canvas-container">
		<canvas id="previewCanvas"></canvas>
		<div class="zoom-info" id="zoomInfo"></div>
	</div>

	<div class="selected-list" id="selectedList" style="display: none;">
		<div class="selected-list-title"><span id="selectedListTitle"></span> (<span id="selectedCount">0</span>)</div>
		<div id="selectedItems"></div>
	</div>

	<div class="button-group">
		<button id="btnSelectAll" onclick="selectAll()"></button>
		<button id="btnClearSelection" onclick="clearSelection()"></button>
		<button id="btnMergeSelected" onclick="mergeSelected()" disabled></button>
		<button id="btnGenerate" onclick="generateFill()"></button>
	</div>
</div>
<!-- 参数编辑对话框 -->
<div class="param-overlay" id="paramOverlay">
	<div class="param-dialog">
		<div class="param-dialog-header" id="paramDialogTitle"></div>
		<div class="param-dialog-body">
			<div class="param-panel">
				<div class="param-item">
					<label id="labelTolerance"></label>
					<div class="param-row">
						<input type="range" id="paramTolerance" min="0" max="1" step="0.01" value="0.35" oninput="ImageModule.onParamChange()" />
						<span class="param-value" id="paramToleranceVal">0.35</span>
					</div>
				</div>
				<div class="param-item">
					<label id="labelSimplification"></label>
					<div class="param-row">
						<input type="range" id="paramSimplification" min="0" max="1" step="0.01" value="0" oninput="ImageModule.onParamChange()" />
						<span class="param-value" id="paramSimplificationVal">0</span>
					</div>
				</div>
				<div class="param-item">
					<label id="labelSmoothing"></label>
					<div class="param-row">
						<input type="range" id="paramSmoothing" min="0" max="1.33" step="0.01" value="0" oninput="ImageModule.onParamChange()" />
						<span class="param-value" id="paramSmoothingVal">0</span>
					</div>
				</div>
				<div class="param-item">
					<label id="labelDespeckling"></label>
					<div class="param-row">
						<input type="range" id="paramDespeckling" min="0" max="5" step="0.1" value="0" oninput="ImageModule.onParamChange()" />
						<span class="param-value" id="paramDespecklingVal">0</span>
					</div>
				</div>
				<div class="param-item">
					<div class="param-toggle">
						<input type="checkbox" id="paramWhiteBg" onchange="ImageModule.onParamChange()" />
						<span id="labelWhiteBg"></span>
					</div>
				</div>
				<div class="param-item">
					<div class="param-toggle">
						<input type="checkbox" id="paramInversion" onchange="ImageModule.onParamChange()" />
						<span id="labelInversion"></span>
					</div>
				</div>
			</div>
			<div class="param-preview">
				<canvas id="paramPreviewCanvas"></canvas>
				<div class="preview-loading" id="paramLoading" style="display: none;"></div>
			</div>
		</div>
		<div class="param-dialog-footer">
			<button id="btnCancel" class="cancel-btn" onclick="ImageModule.cancelParamDialog()"></button>
			<button id="btnConfirm" onclick="ImageModule.confirmParamDialog()"></button>
		</div>
	</div>
</div>

<script>
var edaObj = (typeof eda !== 'undefined') ? eda : (window.parent && window.parent.eda);
function t(tag, ...args) {
	if (edaObj && edaObj.sys_I18n) return edaObj.sys_I18n.text(tag, undefined, undefined, ...args);
	return tag;
}
</script>
<script src="/iframe/js/state.js"></script>
<script src="/iframe/js/geometry.js"></script>
<script src="/iframe/js/canvas.js"></script>
<script src="/iframe/js/events.js"></script>
<script src="/iframe/js/polygon.js"></script>
<script src="/iframe/js/image.js"></script>
<script src="/iframe/js/ui.js"></script>
<script src="/iframe/js/generator.js"></script>
<script src="/iframe/js/main.js"></script>
<script>
// Apply i18n translations to HTML elements
document.title = t('Title');
document.getElementById('btnSelectImage').textContent = t('SelectImage');
document.getElementById('labelSelectLayer').textContent = t('SelectLayer');

var layerSelect = document.getElementById('layerSelect');
var layerKeys = ['LayerDocument', 'LayerTop', 'LayerBottom', 'LayerBoardOutline', 'LayerTopSilkscreen', 'LayerBottomSilkscreen', 'LayerTopSolderMask', 'LayerBottomSolderMask', 'LayerMulti'];
for (var i = 0; i < layerSelect.options.length; i++) {
	layerSelect.options[i].textContent = t(layerKeys[i]);
}

document.getElementById('labelUnit').textContent = t('Unit');
document.getElementById('labelImageWidth').textContent = t('ImageWidth');
document.getElementById('globalLock').title = t('LockAspectRatio');
document.getElementById('labelHeight').textContent = t('Height');
document.getElementById('zoomInfo').textContent = t('ZoomLevel', 100);
document.getElementById('selectedListTitle').textContent = t('SelectedContours');
document.getElementById('btnSelectAll').textContent = t('SelectAllContours');
document.getElementById('btnClearSelection').textContent = t('ClearSelection');
document.getElementById('btnMergeSelected').textContent = t('MergeSelectedContours');
document.getElementById('btnGenerate').textContent = t('GeneratePrimitives');
document.getElementById('paramDialogTitle').textContent = t('ContourExtractionParams');
document.getElementById('labelTolerance').textContent = t('ParamTolerance');
document.getElementById('labelSimplification').textContent = t('ParamSimplification');
document.getElementById('labelSmoothing').textContent = t('ParamSmoothing');
document.getElementById('labelDespeckling').textContent = t('ParamDespeckling');
document.getElementById('labelWhiteBg').textContent = t('WhiteAsBackground');
document.getElementById('labelInversion').textContent = t('Inversion');
document.getElementById('paramLoading').textContent = t('GeneratingPreview');
document.getElementById('btnCancel').textContent = t('Cancel');
document.getElementById('btnConfirm').textContent = t('Confirm');
</script>

</body>
</html>
