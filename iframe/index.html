<!doctype html>
<html lang="zh-Hans">
<head>
	<meta charset="utf-8" />
	<title>图片轮廓提取器</title>
	<meta content="width=device-width, initial-scale=1.0" name="viewport" />
	<style>
		body {
			font-family: 'Segoe UI', sans-serif;
			background: #f0f2f5;
			padding: 0;
			margin: 0;
			width: 100%;
			height: 100vh;
			overflow: hidden;
			display: flex;
			flex-direction: column;
		}

		.preview-box {
			background: white;
			padding: 16px;
			width: 100%;
			height: 100%;
			box-sizing: border-box;
			display: flex;
			flex-direction: column;
			overflow: hidden;
		}

		.preview-title {
			font-size: 16px;
			color: #333;
			margin-bottom: 12px;
			font-weight: bold;
			flex-shrink: 0;
		}

		button {
			padding: 8px 16px;
			background: #1890ff;
			color: white;
			border: none;
			border-radius: 6px;
			cursor: pointer;
			font-size: 13px;
			transition: background 0.3s;
		}

		button:hover {
			background: #096dd9;
		}

		button:disabled {
			background: #d9d9d9;
			cursor: not-allowed;
		}

		.canvas-container {
			position: relative;
			display: flex;
			justify-content: center;
			align-items: center;
			border: 2px solid #d9d9d9;
			border-radius: 4px;
			margin-bottom: 12px;
			flex: 1 1 auto;
			min-height: 250px;
			overflow: hidden;
			background: #f5f5f5;
		}

		#previewCanvas {
			display: block;
			cursor: crosshair;
			background: white;
		}
		
		#previewCanvas:active {
			cursor: crosshair;
		}

		.zoom-info {
			position: absolute;
			top: 8px;
			right: 8px;
			background: rgba(0, 0, 0, 0.7);
			color: white;
			padding: 4px 8px;
			border-radius: 3px;
			font-size: 11px;
			pointer-events: none;
		}

		.controls {
			display: flex;
			gap: 12px;
			align-items: center;
			margin-bottom: 12px;
			flex-wrap: wrap;
			padding: 10px;
			background: #f9f9f9;
			border-radius: 4px;
			flex-shrink: 0;
		}

		.control-group {
			display: flex;
			flex-direction: row;
			gap: 6px;
			align-items: center;
		}

		.control-group label {
			font-size: 13px;
			color: #666;
			white-space: nowrap;
		}

		.control-group select {
			padding: 6px 10px;
			border: 1px solid #d9d9d9;
			border-radius: 4px;
			font-size: 13px;
			min-width: 140px;
		}

		.control-group input[type="number"] {
			padding: 6px 8px;
			border: 1px solid #d9d9d9;
			border-radius: 4px;
			font-size: 13px;
			width: 70px;
		}

		.controls .lock-icon {
			cursor: pointer;
			font-size: 14px;
			color: #1890ff;
			user-select: none;
			padding: 0 4px;
		}

		.controls .lock-icon:hover {
			opacity: 0.8;
		}

		.controls .lock-icon.unlocked {
			color: #999;
		}

		.selected-list {
			margin-top: 12px;
			padding: 12px;
			background: #f5f5f5;
			border-radius: 4px;
			max-height: 180px;
			overflow-y: auto;
			flex-shrink: 1;
		}

		.selected-list-title {
			font-size: 13px;
			font-weight: bold;
			color: #333;
			margin-bottom: 8px;
		}

		.selected-item {
			display: flex;
			flex-direction: column;
			padding: 10px;
			background: white;
			border-radius: 4px;
			margin-bottom: 6px;
			gap: 6px;
		}

		.selected-item-header {
			display: flex;
			justify-content: space-between;
			align-items: center;
		}

		.selected-item-info {
			font-size: 12px;
			color: #666;
			font-weight: bold;
			flex-shrink: 0;
		}

		.selected-item-controls {
			display: flex;
			flex-wrap: wrap;
			gap: 6px;
			align-items: center;
		}

		.selected-item-controls label {
			font-size: 11px;
			color: #666;
			white-space: nowrap;
		}

		.selected-item-controls select,
		.selected-item-controls input {
			padding: 4px 6px;
			border: 1px solid #d9d9d9;
			border-radius: 3px;
			font-size: 11px;
		}

		.selected-item-controls select {
			flex: 1;
			min-width: 100px;
			max-width: 150px;
		}

		.selected-item-controls input[type="number"] {
			width: 60px;
		}

		.selected-item-size {
			display: flex;
			gap: 6px;
			align-items: center;
			padding: 6px;
			background: #f9f9f9;
			border-radius: 3px;
			flex-wrap: wrap;
		}

		.selected-item-size label {
			font-size: 11px;
			color: #666;
			white-space: nowrap;
		}

		.selected-item-size input {
			padding: 4px 6px;
			border: 1px solid #d9d9d9;
			border-radius: 3px;
			font-size: 11px;
			width: 70px;
		}

		.selected-item-size .lock-icon {
			cursor: pointer;
			font-size: 14px;
			color: #666;
			user-select: none;
			padding: 0 4px;
		}

		.selected-item-size .lock-icon:hover {
			color: #1890ff;
		}

		.selected-item-size .lock-icon.locked {
			color: #1890ff;
		}

		.selected-item-remove {
			color: #ff4d4f;
			cursor: pointer;
			font-size: 16px;
			padding: 0 6px;
			flex-shrink: 0;
		}

		.selected-item-remove:hover {
			color: #cf1322;
		}

		.button-group {
			display: flex;
			flex-wrap: wrap;
			gap: 8px;
			margin-top: 12px;
			flex-shrink: 0;
		}
		
		.button-group button {
			flex: 1;
			min-width: 120px;
			white-space: nowrap;
		}
	</style>
</head>
<body>

<div class="preview-box show" id="previewBox">
	<div class="controls">
		<div style="display: flex; gap: 12px; align-items: center; width: 100%;">
			<button onclick="selectImage()">选择图片</button>
			<div class="control-group">
				<label>选择层:</label>
				<select id="layerSelect">
					<option value="13">文档层 (DOCUMENT)</option>
					<option value="1">顶层 (TOP)</option>
					<option value="2">底层 (BOTTOM)</option>
					<option value="11">板框层 (BOARD_OUTLINE)</option>
					<option value="3">顶部丝印 (TOP_SILKSCREEN)</option>
					<option value="4">底部丝印 (BOTTOM_SILKSCREEN)</option>
					<option value="5">顶部阻焊 (TOP_SOLDER_MASK)</option>
					<option value="6">底部阻焊 (BOTTOM_SOLDER_MASK)</option>
					<option value="12">多层 (MULTI)</option>
				</select>
			</div>
		</div>
		<div style="display: flex; gap: 12px; align-items: center; width: 100%;">
			<div class="control-group">
				<label>单位:</label>
				<select id="unitSelect" onchange="updateUnit()">
					<option value="mil">mil</option>
					<option value="mm">mm</option>
				</select>
			</div>
			<div class="control-group">
				<label>图片宽度:</label>
				<input type="number" id="globalWidth" min="0.001" step="0.1" value="0" 
					onchange="updateGlobalSize('width', this.value)" disabled />
				<span id="widthUnit">mil</span>
			</div>
			<span class="lock-icon" id="globalLock" onclick="toggleGlobalLock()" title="锁定宽高比">🔒</span>
			<div class="control-group">
				<label>高度:</label>
				<input type="number" id="globalHeight" min="0.001" step="0.1" value="0" 
					onchange="updateGlobalSize('height', this.value)" disabled />
				<span id="heightUnit">mil</span>
			</div>
		</div>
	</div>

	<div class="canvas-container">
		<canvas id="previewCanvas"></canvas>
		<div class="zoom-info" id="zoomInfo">缩放: 100%</div>
	</div>

	<div class="selected-list" id="selectedList" style="display: none;">
		<div class="selected-list-title">已选择的轮廓 (<span id="selectedCount">0</span>)</div>
		<div id="selectedItems"></div>
	</div>

	<div class="button-group">
		<button onclick="selectAll()">全选轮廓</button>
		<button onclick="clearSelection()">清除选择</button>
		<button onclick="mergeSelected()" id="mergeButton" disabled>合并选中轮廓</button>
		<button onclick="generateFill()">生成图元</button>
	</div>
</div>
<!-- 模块化 JavaScript -->
<script src="/iframe/js/state.js"></script>
<script src="/iframe/js/geometry.js"></script>
<script src="/iframe/js/canvas.js"></script>
<script src="/iframe/js/events.js"></script>
<script src="/iframe/js/polygon.js"></script>
<script src="/iframe/js/image.js"></script>
<script src="/iframe/js/ui.js"></script>
<script src="/iframe/js/generator.js"></script>
<script src="/iframe/js/main.js"></script>

</body>
</html>
